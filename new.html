<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Section</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* HEADER */
h1{
    margin-top:20px;
}

/* BUTTON */
button{
    margin:10px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00e5ff;
    font-weight:bold;
    cursor:pointer;
}

/* CONTAINER */
.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

/* BOX */
.box{
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    padding:20px;
    margin:15px 0;
    transition:0.3s;
}

.box:hover{
    transform:scale(1.05);
}

/* LINKS */
a{
    display:block;
    padding:12px;
    margin:10px;
    text-decoration:none;
    color:white;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
}

a:hover{
    background:#00e5ff;
    color:black;
}
</style>

</head>

<body>

<h1>🆕 New Features</h1>

<!-- 🔙 Back Button -->
<button onclick="goBack()">⬅️ Back</button>

<div class="container">

<!-- 🎵 AUDIO SECTION -->
<div class="box">
<h2>🎵 Audio</h2>
<a href="audio.html">▶️ Open Audio Player</a>
</div>

<!-- 🚀 FUTURE SECTION -->
<div class="box">
<h2>🚀 More Coming Soon</h2>
<a href="#">📁 Files Section</a>
<a href="#">🎮 Games Section</a>
<a href="#">📱 Apps Section</a>
</div>

</div>

<script>
function goBack(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
